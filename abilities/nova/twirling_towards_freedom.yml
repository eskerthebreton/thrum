name: Twirling Towards Freedom
art: Kineticism
index: 1
type: Action
tags: []
parameters:
  Potential: "An enemy is moved as a result of one of your abilities\n(not including this one)"
  Cost: 4
  Target: Aura $\infty$
effects:
  - type: Effect
    text: |
      You may move each character in the Aura a number of spaces equal to
      their distance from you either clockwise or counterclockwise along
      the square of spaces that distance from you. You can choose different
      directions for each character. Enemies who collide with another character
      or with terrain which is +2 or more from their previous space stop
      moving and are **Stunned**
upgrades:
  a: |
    Enemies who collide also take **Fatigue**
  b: |
    When you move an enemy using this effect, you may move them 1 space diagonally
    at any point during their path such that they end up 1 space further from you
    than they started
