name: Messenger of Woe
art: Infusion
index: 1
type: Action
tags:
  - Buff
parameters:
  Potential: You inflict one or more stacks of any Status (up to once per turn)
  Cost: 4
  Target: Self
effects:
  - type: Effect
    text: |
      Once per turn immediately before or after your Action (including this one) you can
      **Teleport** up to 3 and choose **Burning**, **Slowed**, **Blinded** or **Shocked**.
      Deal **+1** of the chosen status as an Effect to any enemy adjacent to the space you
      left or arrived.
upgrades:
  a: |
    Reduce the Cost by 1
  b: |
    You can use the Effect before and after your Action
