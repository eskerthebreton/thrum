name: Quiet Mind
art: Ninjutsu
index: 4
type: Stance
tags: []
parameters:
  Trigger: "You make an **Evasion** roll"
effects:
  - type: Effect
    text: |
      If you Critically Succeeded, you may remove **2**$^a$ stacks of any one status
      from yourself after the attack resolves. Otherwise, you may treat the outcome
      as one category better than the roll. In either case, end this stance.  
upgrades:
  a: |
    Add half your REA to the number of stacks removed on a Critical  
  b: |
    You may remove 1 stack of a status when you get a normal Success (before upgrading the result)
