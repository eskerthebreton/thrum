name: Earthen Hide
art: Elementalism
index: 4
type: Stance
tags: []
parameters:
  Trigger: You are targeted by a Physical Attack
effects:
  - type: Effect
    text: |
      Add your Elementalism Training to your Resilience roll.
      If you roll a Critical success, you may remain in this stance.
      Otherwise, end this stance unless you take **Stress** to stay in it.  
upgrades:
  a: |
    Add half your POW to the bonus  
  b: |
    Reduce the threshold for a Critical Success by your FOC  
